<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ratto Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-box {
            background: #0f1229;
            border: 2px solid #00aaff;
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }
        
        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #00aaff, #0080ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #8b9dc3;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            background: #0a0e27;
            border: 1px solid rgba(0, 170, 255, 0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #00aaff;
        }
        
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00aaff, #0080ff);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 170, 255, 0.4);
        }
        
        .toggle-form {
            text-align: center;
            margin-top: 20px;
            color: #8b9dc3;
        }
        
        .toggle-form a {
            color: #00aaff;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2><i class="fas fa-code"></i> RATTO HUB</h2>
            
            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn-submit">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
                <div class="toggle-form">
                    Não tem conta? <a href="#" onclick="toggleForm(); return false;">Cadastre-se</a>
                </div>
            </form>
            
            <!-- Register Form -->
            <form id="register-form" style="display: none;">
                <div class="form-group">
                    <label>Nome de Usuário</label>
                    <input type="text" id="register-username" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="register-email" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="register-password" required>
                </div>
                <button type="submit" class="btn-submit">
                    <i class="fas fa-user-plus"></i> Cadastrar
                </button>
                <div class="toggle-form">
                    Já tem conta? <a href="#" onclick="toggleForm(); return false;">Fazer login</a>
                </div>
            </form>
        </div>
    </div>
    
    <script src="auth.js"></script>
    <script>
        function toggleForm() {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            
            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
            }
        }
        
        // Login
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            const result = Auth.login(email, password);
            
            if (result.success) {
                alert('✅ ' + result.message);
                window.location = 'index.html';
            } else {
                alert('❌ ' + result.message);
            }
        });
        
        // Register
        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('register-username').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            
            const result = Auth.register(username, email, password);
            
            if (result.success) {
                alert('✅ ' + result.message + '\nAgora faça login!');
                toggleForm();
            } else {
                alert('❌ ' + result.message);
            }
        });
    </script>
</body>
</html>
